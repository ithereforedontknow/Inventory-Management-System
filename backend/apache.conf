<VirtualHost *:80>
    DocumentRoot /var/www/html/public
    DirectoryIndex index.php

    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted
        Options -Indexes

        # Allow .htaccess rewrites
        RewriteEngine On
    </Directory>

    # Do NOT set CORS headers here — PHP middleware handles them
    # to respect the ALLOWED_ORIGINS env variable

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
