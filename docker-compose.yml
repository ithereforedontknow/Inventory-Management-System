services:
  db:
    image: mysql:8.0
    container_name: inventory_db
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    expose:
      - "3306"
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      timeout: 10s
      retries: 10
      interval: 5s
      start_period: 30s

  backend:
    build: ./backend
    container_name: inventory_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS}
      APP_ENV: ${APP_ENV}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin1234}
      PORT: 3001
    expose:
      - "3001"
    depends_on:
      db:
        condition: service_healthy
    develop:
      watch:
        - action: sync+restart
          path: ./backend
          target: /app # Adjust this to your WORKDIR in backend Dockerfile
          ignore:
            - node_modules/

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: inventory_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app # Adjust based on where your source code lives in the container
          ignore:
            - node_modules/
        - action: rebuild
          path: ./frontend/package.json

volumes:
  db_data:
